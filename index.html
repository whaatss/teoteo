<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEOTEO — Minecraft сумасшествие!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- ПЕРЕМЕННЫЕ --- */
        :root {
            --bg-black: #030303; 
            --card-bg: #0c0c0c;
            --accent: #ff6b00; 
            --accent-glow: rgba(255, 107, 0, 0.4); 
            --text-white: #ffffff;
            --text-muted: #888888;
        }

        html { 
            scroll-behavior: smooth; 
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- НАВИГАЦИЯ --- */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 20px 0;
            z-index: 100;
            background: rgba(3, 3, 3, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.4rem; }
        .logo img { width: 35px; border-radius: 8px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 35px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-white); }

        /* --- SCOREBOARD --- */
        .scoreboard {
            position: fixed;
            top: 100px;
            right: 30px;
            background: rgba(12, 12, 12, 0.9);
            border: 2px solid var(--accent);
            padding: 12px 20px;
            border-radius: 15px;
            z-index: 90;
            box-shadow: 0 0 20px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .score-value { font-size: 1.8rem; font-weight: 900; color: var(--accent); }

        /* --- HERO --- */
        .hero-screen {
            min-height: 100vh; display: flex; align-items: center;
            padding: 120px 0 60px;
        }
        .hero-card {
            background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center;
            border-radius: 30px; padding: 100px 60px; border: 1px solid rgba(255,255,255,0.05);
        }
        .hero-content h1 { font-size: 4rem; margin: 0; font-weight: 900; line-height: 1.1; }
        .highlight { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
        .description { font-size: 1.2rem; color: #ccc; margin: 25px 0 40px; max-width: 600px; }

        /* --- КНОПКИ --- */
        .btn-main {
            background: var(--accent); color: #000; padding: 16px 35px; border-radius: 12px;
            text-decoration: none; font-weight: 800; text-transform: uppercase; transition: 0.3s;
            display: inline-block;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow); }

        /* --- СЕКЦИЯ С КАРТИНКАМИ (КАК MINEFITE) --- */
        .showcase-section {
            padding: 100px 0;
            overflow: hidden;
        }
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 50px;
        }
        .showcase-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--card-bg);
        }
        .showcase-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .showcase-item:hover img { transform: scale(1.05); }

        .reveal-left { transform: translateX(-50px); opacity: 0; transition: 1s; }
        .reveal-right { transform: translateX(50px); opacity: 0; transition: 1s; }
        .reveal-left.active, .reveal-right.active { transform: translateX(0); opacity: 1; }

        /* --- СЕКЦИЯ С ВИДЕО --- */
        .video-section {
            padding: 80px 0;
            text-align: center;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            border-radius: 25px;
            overflow: hidden;
            border: 4px solid var(--card-bg);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            aspect-ratio: 16/9;
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- ЛАУНЧЕР --- */
        .launcher-section { padding: 100px 0; }
        .launcher-card {
            background: #111; border-radius: 30px; padding: 60px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- TUMBLEWEED (ПЕРЕКАТИ-ПОЛЕ) --- */
        .tumbleweed-container {
            position: fixed; z-index: 5; pointer-events: auto; cursor: pointer;
            left: -200px; top: -200px;
        }
        .tumbleweed-bounce { animation: bounce-chaotic 8s infinite; }
        .tumbleweed-img { width: 80px; animation: spin-roll 3s linear infinite; }
        .explosion { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150px; display: none; }
        .gold-ingot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; display: none; image-rendering: pixelated; }

        @keyframes bounce-chaotic {
            0%, 100% { transform: translateY(0); }
            20% { transform: translateY(-100px); }
            40% { transform: translateY(0); }
            60% { transform: translateY(-50px); }
            80% { transform: translateY(0); }
        }
        @keyframes spin-roll { 0% { transform: rotate(0); } 100% { transform: rotate(-360deg); } }
        @keyframes ingot-float {
            0% { transform: translate(-50%, -50%) translateY(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) translateY(-100px); opacity: 0; }
        }

        /* АДАПТИВ */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .image-grid { grid-template-columns: 1fr; }
            .launcher-card { flex-direction: column; text-align: center; gap: 30px; }
            .scoreboard { top: auto; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="scoreboard" id="scoreboard">
        <div class="score-value" id="score-count">0</div>
        <img src="sr2327cb1dd7ff0.png" width="25" alt="Gold">
    </div>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">TEOTEO</div>
            <div class="nav-links">
                <a href="#">Форум</a>
                <a href="#">Донат</a>
            </div>
        </div>
    </nav>

    <section class="hero-screen">
        <div class="container">
            <div class="hero-card">
                <div class="hero-content">
                    <h1>TEOTEO — <br><span class="highlight">Minecraft сумасшествие!</span></h1>
                    <p class="description">Мир, где царит Дикий Запад, безумие и полная свобода действий. Начни свой путь прямо сейчас!</p>
                    <a href="#showcase" class="btn-main">Исследовать мир ↓</a>
                </div>
            </div>
        </div>
    </section>

    <!-- СЕКЦИЯ С КАРТИНКАМИ (REVEAL ANIMATION) -->
    <section class="showcase-section" id="showcase">
        <div class="container">
            <h2 class="reveal" style="font-size: 3rem; text-align: center; margin-bottom: 50px;">НАШ <span class="highlight">МИР</span></h2>
            
            <div class="image-grid">
                <div class="showcase-item reveal-left">
                    <img src="unnamed.jpg" alt="Minecraft World 1" onerror="this.src='https://images.unsplash.com/photo-1587573089734-09cb69c0f2b4?auto=format&fit=crop&q=80&w=800'">
                </div>
                <div class="showcase-item reveal-right">
                    <img src="unnamed (1).jpg" alt="Minecraft World 2" onerror="this.src='https://images.unsplash.com/photo-1614850715649-1d0106293bd1?auto=format&fit=crop&q=80&w=800'">
                </div>
            </div>
        </div>
    </section>

    <!-- ВИДЕО СЕКЦИЯ -->
    <section class="video-section">
        <div class="container">
            <h2 class="reveal" style="font-size: 2.5rem;">ТРЕЙЛЕР <span class="highlight">ПРИКЛЮЧЕНИЙ</span></h2>
            <div class="video-container reveal">
                <iframe src="https://www.youtube.com/embed/BWsO9j6QcGg" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <section class="launcher-section">
        <div class="container">
            <div class="launcher-card reveal">
                <div>
                    <h2 style="font-size: 2.5rem; margin: 0 0 10px;">Наш лаунчер</h2>
                    <p style="color: var(--text-muted);">Эксклюзивные моды и стабильная игра.</p>
                </div>
                <a href="#" class="btn-main">Скачать клиент ⬇</a>
            </div>
        </div>
    </section>

    <div class="tumbleweed-container" id="tumbleweed">
        <div class="tumbleweed-bounce">
            <img src="1691660596_grizly-club-p-kartinki-perekati-pole-bez-fona-47.png" class="tumbleweed-img" id="tumbleweed-img">
            <img src="explosion_generator.gif" class="explosion" id="explosion-gif">
            <img src="sr2327cb1dd7ff0.png" class="gold-ingot" id="gold-ingot">
        </div>
    </div>

    <script>
        // --- ПРИНУДИТЕЛЬНЫЙ ВЕРХ ---
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);

        // --- REVEAL ANIMATION (SCROLL SPY) ---
        function reveal() {
            const reveals = document.querySelectorAll('.reveal, .reveal-left, .reveal-right');
            for (let i = 0; i < reveals.length; i++) {
                const windowHeight = window.innerHeight;
                const elementTop = reveals[i].getBoundingClientRect().top;
                const elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add('active');
                }
            }
        }
        window.addEventListener('scroll', reveal);

        // --- TUMBLEWEED LOGIC ---
        const tumbleweed = document.getElementById('tumbleweed');
        const tumbleweedImg = document.getElementById('tumbleweed-img');
        const explosionGif = document.getElementById('explosion-gif');
        const goldIngot = document.getElementById('gold-ingot');
        const scoreElement = document.getElementById('score-count');
        let count = 0;

        function spawnTumbleweed() {
            tumbleweedImg.style.opacity = '1';
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            tumbleweed.style.transition = 'none';
            tumbleweed.style.left = '-150px';
            tumbleweed.style.top = (Math.random() * (h - 200) + 100) + 'px';
            
            setTimeout(() => {
                tumbleweed.style.transition = 'left 8s linear';
                tumbleweed.style.left = (w + 150) + 'px';
            }, 100);

            setTimeout(spawnTumbleweed, 12000);
        }

        tumbleweed.onclick = () => {
            if (tumbleweedImg.style.opacity === '0') return;
            count++;
            scoreElement.innerText = count;
            
            tumbleweedImg.style.opacity = '0';
            explosionGif.style.display = 'block';
            goldIngot.style.display = 'block';
            goldIngot.style.animation = 'ingot-float 1s forwards';

            setTimeout(() => {
                explosionGif.style.display = 'none';
                goldIngot.style.display = 'none';
                goldIngot.style.animation = '';
            }, 1000);
        };

        window.onload = () => {
            reveal(); // Проверка видимости при загрузке
            spawnTumbleweed();
        };
    </script>
</body>
</html>
