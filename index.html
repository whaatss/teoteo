<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEOTEO — Minecraft сумасшествие!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- ПЕРЕМЕННЫЕ --- */
        :root {
            --bg-black: #030303; 
            --card-bg: #0c0c0c;
            --accent: #ff6b00; 
            --accent-glow: rgba(255, 107, 0, 0.4); 
            --text-white: #ffffff;
            --text-muted: #888888;
        }

        html { 
            scroll-behavior: smooth; 
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- НАВИГАЦИЯ --- */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 20px 0;
            z-index: 50;
            background: rgba(3, 3, 3, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; }
        .logo img { width: 35px; border-radius: 8px; }
        
        .nav-links { display: flex; align-items: center; }
        .nav-links a { 
            color: var(--text-muted); text-decoration: none; margin-left: 35px; 
            font-weight: 600; transition: 0.3s ease; position: relative;
        }
        .nav-links a:hover { color: var(--text-white); }

        /* --- СЧЕТЧИК (SCOREBOARD) --- */
        .scoreboard {
            position: fixed;
            top: 100px;
            right: 30px;
            background: rgba(12, 12, 12, 0.8);
            border: 2px solid var(--accent);
            padding: 15px 25px;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 0 20px var(--accent-glow);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .scoreboard.bump {
            transform: scale(1.1);
        }
        .scoreboard-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .score-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }

        /* --- ПЕРВАЯ СЕКЦИЯ --- */
        .hero-screen {
            min-height: 100vh; display: flex; align-items: center;
            background-color: var(--bg-black); padding-top: 100px; padding-bottom: 40px; box-sizing: border-box;
        }

        .hero-card {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), url('background.jpg') center/cover;
            background-color: #111; border-radius: 30px; padding: 100px 70px;
            border: 1px solid rgba(255, 255, 255, 0.05); width: 100%; box-sizing: border-box;
            position: relative; overflow: hidden;
        }

        .hero-content h1 { font-size: 4.5rem; margin: 0; font-weight: 900; line-height: 1.1; word-wrap: break-word; }
        .highlight { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .description { font-size: 1.25rem; color: #ccc; margin: 30px 0 40px 0; max-width: 650px; line-height: 1.6; }

        /* --- КНОПКИ --- */
        .btn-main {
            background: var(--accent); color: #000; padding: 18px 45px; border-radius: 12px;
            text-decoration: none; font-weight: 800; font-size: 1.1rem; display: inline-block;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
            position: relative;
            z-index: 10;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 25px var(--accent-glow); }

        /* --- ВТОРАЯ СЕКЦИЯ --- */
        .bottom-screen {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            padding: 80px 0 50px 0; position: relative;
        }
        .grid-layout { display: grid; grid-template-columns: 1fr 1.8fr; gap: 60px; z-index: 2; }

        .launcher-card {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url('launcher-bg.jpg') center/cover;
            background-color: #1a1a1a; border-radius: 30px; padding: 80px; border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 350px; display: flex; align-items: center; position: relative; overflow: hidden;
        }
        .launcher-content h3 { font-size: 2.5rem; margin-top: 0; margin-bottom: 30px; line-height: 1.2; }

        /* =========================================
           АНИМАЦИЯ ПЕРЕКАТИ-ПОЛЯ (TUMBLEWEED)
        ========================================= */
        .tumbleweed-container {
            position: fixed;
            z-index: 5;
            pointer-events: auto;
            cursor: pointer;
            left: -200px;
            top: -200px;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Убирает синий квадрат при тапе на мобилках */
        }

        .tumbleweed-bounce {
            animation: bounce-chaotic 8s ease-in-out infinite;
            position: relative;
        }

        .tumbleweed-img {
            width: 80px;
            height: auto;
            opacity: 0.85;
            animation: spin-roll 3s linear infinite;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
            transition: opacity 0.15s ease;
        }

        .explosion {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: auto;
            pointer-events: none;
            display: none;
            z-index: 12;
        }

        .gold-ingot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            pointer-events: none;
            display: none;
            z-index: 13;
            image-rendering: pixelated;
        }

        @keyframes ingot-float {
            0% { transform: translate(-50%, -50%) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) translateY(-120px) rotate(30deg); opacity: 0; }
        }

        @keyframes bounce-chaotic {
            0%, 100% { transform: translateY(0px) scaleY(0.95); }
            10% { transform: translateY(-150px) scaleY(1.05); }
            25% { transform: translateY(0px) scaleY(0.95); }
            40% { transform: translateY(-80px) scaleY(1); }
            55% { transform: translateY(0px) scaleY(0.95); }
            65% { transform: translateY(-30px) scaleY(1); }
            75% { transform: translateY(0px) scaleY(0.95); }
            85% { transform: translateY(-180px) scaleY(1.05); }
        }

        @keyframes spin-roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        /* =========================================
           АДАПТИВ ДЛЯ МОБИЛЬНЫХ (MEDIA QUERIES)
        ========================================= */
        @media (max-width: 992px) {
            .hero-content h1 { font-size: 3.5rem; }
            .grid-layout { grid-template-columns: 1fr; gap: 40px; } /* Блоки друг под другом */
            .launcher-card { min-height: 250px; padding: 60px 40px; }
        }

        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            
            /* Шапка */
            .navbar { padding: 15px 0; }
            .logo { font-size: 1.2rem; }
            .logo img { width: 30px; }
            .nav-links a { margin-left: 20px; font-size: 0.9rem; }

            /* Счетчик */
            .scoreboard {
                top: 80px; 
                right: 20px;
                padding: 10px 15px;
                gap: 10px;
                border-radius: 12px;
            }
            .score-value { font-size: 1.4rem; }
            .scoreboard img { width: 20px; }
            .scoreboard-title { font-size: 0.65rem; }

            /* Главный экран */
            .hero-screen { padding-top: 130px; }
            .hero-card { padding: 50px 30px; border-radius: 20px; }
            .hero-content h1 { font-size: 2.8rem; }
            .description { font-size: 1rem; margin: 20px 0 30px 0; }
            .btn-main { padding: 15px 30px; font-size: 1rem; width: 100%; box-sizing: border-box; text-align: center; }

            /* Лаунчер блок */
            .launcher-card { padding: 40px 30px; }
            .launcher-content h3 { font-size: 2rem; }
        }

        @media (max-width: 480px) {
            /* Фиксы для совсем узких экранов (телефоны) */
            .hero-content h1 { font-size: 2.2rem; }
            .hero-card { padding: 40px 20px; }
            
            .nav-links a { margin-left: 15px; font-size: 0.85rem; }
            
            .launcher-content h3 { font-size: 1.8rem; }
            
            /* Уменьшаем перекати-поле на телефоне, чтобы было легче попасть, но не закрывало экран */
            .tumbleweed-img { width: 65px; }
            .explosion { width: 140px; }
        }
    </style>
</head>
<body>

    <!-- СЧЕТЧИК -->
    <div class="scoreboard" id="scoreboard">
        <div>
            <div class="scoreboard-title">Разбито</div>
            <div class="score-value" id="score-count">0</div>
        </div>
        <img src="sr2327cb1dd7ff0.png" width="30" alt="Золотой слиток" style="image-rendering: pixelated;">
    </div>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
                <span>TEOTEO</span>
            </div>
            <div class="nav-links">
                <a href="#">Форум</a>
                <a href="#">Донат</a>
            </div>
        </div>
    </nav>

    <section class="hero-screen">
        <div class="container" style="width: 100%;">
            <div class="hero-card">
                <div class="hero-content">
                    <h1>TEOTEO — <br><span class="highlight">Minecraft сумасшествие!</span></h1>
                    <p class="description">
                        Мир в котором может твориться хаос и царить гармония! <br>
                        Мир где можно войти в дверь либо в окно! Дикий Запад.
                    </p>
                    <div class="hero-btns">
                        <a href="#start-section" class="btn-main">Начать игру ▶</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="start-section" class="bottom-screen">
        <div class="container grid-layout">
            <div class="info-side">
                <div class="footer-brand">
                    <h2 style="font-size: 2rem; margin-top: 0;">TEOTEO</h2>
                    <p style="color: var(--text-muted);">© 2026. Все права защищены.</p>
                </div>
            </div>
            <div class="launcher-card">
                <div class="launcher-content">
                    <h3>Наш собственный<br>лаунчер</h3>
                    <a href="#" class="btn-main">Загрузить ⬇</a>
                </div>
            </div>
        </div>
    </section>

    <!-- ПЕРЕКАТИ-ПОЛЕ -->
    <div class="tumbleweed-container" id="tumbleweed">
        <div class="tumbleweed-bounce">
            <img src="1691660596_grizly-club-p-kartinki-perekati-pole-bez-fona-47.png" alt="Перекати-поле" class="tumbleweed-img" id="tumbleweed-img">
            <img src="explosion_generator.gif" alt="Взрыв" class="explosion" id="explosion-gif">
            <img src="sr2327cb1dd7ff0.png" alt="Золотой слиток" class="gold-ingot" id="gold-ingot">
        </div>
    </div>

    <script>
        const tumbleweed = document.getElementById('tumbleweed');
        const tumbleweedImg = document.getElementById('tumbleweed-img');
        const explosionGif = document.getElementById('explosion-gif');
        const goldIngot = document.getElementById('gold-ingot');
        const scoreElement = document.getElementById('score-count');
        const scoreboard = document.getElementById('scoreboard');

        let count = 0;
        let activeAnimation = null;

        function spawnTumbleweed() {
            tumbleweedImg.style.opacity = '0.85';
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            const padding = 100;
            
            const safeMargin = 0.25; 

            const isHorizontal = Math.random() > 0.4; 
            let startX, startY, endX, endY;

            if (isHorizontal) {
                const isTop = Math.random() > 0.5;
                startY = isTop ? 50 + Math.random() * (h * safeMargin - 50) : h - 50 - (Math.random() * (h * safeMargin - 50));
                endY = startY + (Math.random() * 100 - 50); 
                
                startX = Math.random() > 0.5 ? -padding : w + padding;
                endX = startX < 0 ? w + padding : -padding;
            } else {
                const isLeft = Math.random() > 0.5;
                startX = isLeft ? 50 + Math.random() * (w * safeMargin - 50) : w - 50 - (Math.random() * (w * safeMargin - 50));
                endX = startX + (Math.random() * 100 - 50);
                
                startY = Math.random() > 0.5 ? -padding : h + padding;
                endY = startY < 0 ? h + padding : -padding;
            }

            tumbleweed.style.transition = 'none';
            tumbleweed.style.left = startX + 'px';
            tumbleweed.style.top = startY + 'px';

            tumbleweed.offsetHeight;

            const duration = 5000 + Math.random() * 3000; 
            
            tumbleweed.style.transition = `left ${duration}ms linear, top ${duration}ms linear`;
            tumbleweed.style.left = endX + 'px';
            tumbleweed.style.top = endY + 'px';

            if (activeAnimation) clearTimeout(activeAnimation);
            activeAnimation = setTimeout(() => {
                if (tumbleweedImg.style.opacity !== '0') {
                    spawnTumbleweed();
                }
            }, duration);
        }

        // touchstart работает быстрее click на мобильных устройствах
        tumbleweed.addEventListener('click', handleHit);
        tumbleweed.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Запрещаем эмуляцию мыши после тапа
            handleHit(e);
        }, {passive: false});

        function handleHit(e) {
            if (tumbleweedImg.style.opacity === '0') return;
            if (e) e.stopPropagation();

            count++;
            scoreElement.innerText = count;
            scoreboard.classList.add('bump');
            setTimeout(() => scoreboard.classList.remove('bump'), 200);

            tumbleweedImg.style.opacity = '0';
            const rect = tumbleweed.getBoundingClientRect();
            tumbleweed.style.transition = 'none';
            tumbleweed.style.left = rect.left + 'px';
            tumbleweed.style.top = rect.top + 'px';
            
            const currentExplosionSrc = explosionGif.src;
            explosionGif.src = '';
            explosionGif.src = currentExplosionSrc;
            explosionGif.style.display = 'block';
            
            goldIngot.style.display = 'block';
            goldIngot.style.animation = 'ingot-float 1.5s forwards ease-out';

            setTimeout(() => {
                explosionGif.style.display = 'none';
            }, 1000);

            setTimeout(() => {
                goldIngot.style.display = 'none';
                goldIngot.style.animation = '';
                spawnTumbleweed();
            }, 1500);
        }

        window.onload = spawnTumbleweed;
    </script>

</body>
</html>
