<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEOTEO — Minecraft сумасшествие!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- ПЕРЕМЕННЫЕ --- */
        :root {
            --bg-black: #030303; 
            --card-bg: #0c0c0c;
            --accent: #ff6b00; 
            --accent-glow: rgba(255, 107, 0, 0.4); 
            --text-white: #ffffff;
            --text-muted: #888888;
        }

        html { 
            scroll-behavior: smooth; 
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- НАВИГАЦИЯ --- */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 20px 0;
            z-index: 50;
            background: rgba(3, 3, 3, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; }
        .logo img { width: 35px; border-radius: 8px; }
        
        .nav-links a { 
            color: var(--text-muted); text-decoration: none; margin-left: 35px; 
            font-weight: 600; transition: 0.3s ease; position: relative;
        }
        .nav-links a:hover { color: var(--text-white); }

        /* --- СЧЕТЧИК (SCOREBOARD) --- */
        .scoreboard {
            position: fixed;
            top: 100px;
            right: 30px;
            background: rgba(12, 12, 12, 0.8);
            border: 2px solid var(--accent);
            padding: 15px 25px;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 0 20px var(--accent-glow);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .scoreboard.bump {
            transform: scale(1.1);
        }
        .scoreboard-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .score-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }

        /* --- ПЕРВАЯ СЕКЦИЯ --- */
        .hero-screen {
            height: 100vh; display: flex; align-items: center;
            background-color: var(--bg-black); padding-top: 60px; box-sizing: border-box;
        }

        .hero-card {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), url('background.jpg') center/cover;
            background-color: #111; border-radius: 30px; padding: 100px 70px;
            border: 1px solid rgba(255, 255, 255, 0.05); width: 100%; box-sizing: border-box;
            position: relative; overflow: hidden;
        }

        .hero-content h1 { font-size: 4.5rem; margin: 0; font-weight: 900; line-height: 1.1; }
        .highlight { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .description { font-size: 1.25rem; color: #ccc; margin: 30px 0 40px 0; max-width: 650px; line-height: 1.6; }

        /* --- КНОПКИ --- */
        .btn-main {
            background: var(--accent); color: #000; padding: 18px 45px; border-radius: 12px;
            text-decoration: none; font-weight: 800; font-size: 1.1rem; display: inline-block;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 25px var(--accent-glow); }

        /* --- ВТОРАЯ СЕКЦИЯ --- */
        .bottom-screen {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            padding: 120px 0 50px 0; position: relative;
        }
        .grid-layout { display: grid; grid-template-columns: 1fr 1.8fr; gap: 60px; z-index: 2; }

        .launcher-card {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url('launcher-bg.jpg') center/cover;
            background-color: #1a1a1a; border-radius: 30px; padding: 80px; border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 350px; display: flex; align-items: center; position: relative; overflow: hidden;
        }

        /* =========================================
           АНИМАЦИЯ ПЕРЕКАТИ-ПОЛЯ (TUMBLEWEED)
        ========================================= */
        
        .tumbleweed-container {
            position: fixed;
            bottom: 5%;
            right: -150px;
            z-index: 9999;
            pointer-events: auto;
            cursor: pointer;
            animation: move-left 18s linear infinite;
        }

        .tumbleweed-bounce {
            animation: bounce-chaotic 8s ease-in-out infinite;
            position: relative;
        }

        .tumbleweed-img {
            width: 80px;
            height: auto;
            opacity: 0.85;
            animation: spin-roll 3s linear infinite;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
            transition: opacity 0.15s ease;
        }

        /* Эффект взрыва (НОВЫЙ GIF) */
        .explosion {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px; /* Немного увеличим для красоты */
            height: auto;
            pointer-events: none;
            display: none;
            z-index: 10000;
        }

        /* Золотой слиток */
        .gold-ingot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            pointer-events: none;
            display: none;
            z-index: 10001;
            image-rendering: pixelated; /* Сохраняем четкость пикселей */
        }

        @keyframes ingot-float {
            0% { transform: translate(-50%, -50%) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) translateY(-120px) rotate(30deg); opacity: 0; }
        }

        @keyframes move-left {
            0% { right: -150px; }
            100% { right: 110vw; }
        }

        @keyframes bounce-chaotic {
            0%, 100% { transform: translateY(0px) scaleY(0.95); }
            10% { transform: translateY(-150px) scaleY(1.05); }
            25% { transform: translateY(0px) scaleY(0.95); }
            40% { transform: translateY(-80px) scaleY(1); }
            55% { transform: translateY(0px) scaleY(0.95); }
            65% { transform: translateY(-30px) scaleY(1); }
            75% { transform: translateY(0px) scaleY(0.95); }
            85% { transform: translateY(-180px) scaleY(1.05); }
        }

        @keyframes spin-roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }
    </style>
</head>
<body>

    <!-- СЧЕТЧИК -->
    <div class="scoreboard" id="scoreboard">
        <div>
            <div class="scoreboard-title">Разбито</div>
            <div class="score-value" id="score-count">0</div>
        </div>
        <img src="sr2327cb1dd7ff0.png" width="30" alt="Gold Ingot" style="image-rendering: pixelated;">
    </div>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
                <span>TEOTEO</span>
            </div>
            <div class="nav-links">
                <a href="#">Форум</a>
                <a href="#">Донат</a>
            </div>
        </div>
    </nav>

    <section class="hero-screen">
        <div class="container" style="width: 100%;">
            <div class="hero-card">
                <div class="hero-content">
                    <h1>TEOTEO — <br><span class="highlight">Minecraft сумасшествие!</span></h1>
                    <p class="description">
                        Мир в котором может твориться хаос и царить гармония! <br>
                        Мир где можно войти в дверь либо в окно! Дикий Запад.
                    </p>
                    <div class="hero-btns">
                        <a href="#start-section" class="btn-main">Начать игру ▶</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="start-section" class="bottom-screen">
        <div class="container grid-layout">
            <div class="info-side">
                <div class="footer-brand">
                    <h2>TEOTEO</h2>
                    <p>© 2026. Все права защищены.</p>
                </div>
            </div>
            <div class="launcher-card">
                <div class="launcher-content">
                    <h3>Наш собственный<br>лаунчер</h3>
                    <a href="#" class="btn-main">Загрузить ⬇</a>
                </div>
            </div>
        </div>
    </section>

    <!-- ПЕРЕКАТИ-ПОЛЕ -->
    <div class="tumbleweed-container" id="tumbleweed">
        <div class="tumbleweed-bounce">
            <img src="1691660596_grizly-club-p-kartinki-perekati-pole-bez-fona-47.png" alt="Перекати-поле" class="tumbleweed-img" id="tumbleweed-img">
            <!-- Новый взрыв -->
            <img src="explosion_generator.gif" alt="Взрыв" class="explosion" id="explosion-gif">
            <!-- Золотой слиток -->
            <img src="sr2327cb1dd7ff0.png" alt="Золотой слиток" class="gold-ingot" id="gold-ingot">
        </div>
    </div>

    <script>
        const tumbleweed = document.getElementById('tumbleweed');
        const tumbleweedImg = document.getElementById('tumbleweed-img');
        const explosionGif = document.getElementById('explosion-gif');
        const goldIngot = document.getElementById('gold-ingot');
        const scoreElement = document.getElementById('score-count');
        const scoreboard = document.getElementById('scoreboard');

        let count = 0;

        tumbleweed.addEventListener('click', function() {
            if (tumbleweedImg.style.opacity === '0') return;

            // 1. Увеличиваем счет
            count++;
            scoreElement.innerText = count;
            
            // Визуальный эффект "толчка" счетчика
            scoreboard.classList.add('bump');
            setTimeout(() => scoreboard.classList.remove('bump'), 200);

            // 2. Скрываем перекати-поле
            tumbleweedImg.style.opacity = '0';
            
            // 3. Запускаем новый взрыв (сбрасываем src для перезапуска GIF)
            const currentExplosionSrc = explosionGif.src;
            explosionGif.src = '';
            explosionGif.src = currentExplosionSrc;
            explosionGif.style.display = 'block';
            
            // 4. Показываем золото
            goldIngot.style.display = 'block';
            goldIngot.style.animation = 'ingot-float 1.5s forwards ease-out';

            // 5. Очистка эффектов
            setTimeout(() => {
                explosionGif.style.display = 'none';
            }, 1000);

            setTimeout(() => {
                goldIngot.style.display = 'none';
                goldIngot.style.animation = '';
            }, 1500);

            // 6. Возвращение перекати-поля
            setTimeout(() => {
                tumbleweedImg.style.opacity = '0.85';
            }, 2500);
        });
    </script>

</body>
</html>
