<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Minecraft Сервер</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="overlay"></div>
    
    <div class="main-card">
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <h1>CRAFT-SERVER</h1>
            <p>Версия 1.20.1 | Ламповое выживание</p>
        </header>

        <div class="button-grid">
            <a href="https://discord.gg/invite" class="btn discord">
                <i class="fab fa-discord"></i> Наш Discord
            </a>
            <a href="https://youtube.com/@channel" class="btn youtube">
                <i class="fab fa-youtube"></i> YouTube канал
            </a>
            <a href="launcher.exe" download class="btn download">
                <i class="fas fa-download"></i> Скачать Лаунчер
            </a>
            <a href="http://твой-ip:8123" target="_blank" class="btn bluemap">
                <i class="fas fa-map-marked-alt"></i> Онлайн Карта
            </a>
        </div>

        <footer>
            <p>IP: play.myserver.ru (нажми, чтобы скопировать)</p>
        </footer>
    </div>

</body>
</html>
